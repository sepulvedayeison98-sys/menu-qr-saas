<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>La Cafeleta — Menú</title>
  <meta name="description" content="Carta de bebidas de La Cafeleta — café colombiano premium. Escanea, lee y disfruta." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Open Graph (vista previa al compartir el link, ej. WhatsApp) -->
  <meta property="og:type" content="restaurant.menu" />
  <meta property="og:title" content="La Cafeleta — Menú" />
  <meta property="og:description" content="Café Colombiano Premium. Escanea, lee y disfruta." />
  <meta property="og:locale" content="es_CO" />
  <meta property="og:url" content="https://lacafeleta.com/" />
  <meta property="og:image" content="https://lacafeleta.com/img/cafeleta-cart.jpg" />
  <meta property="og:image:width" content="784" />
  <meta property="og:image:height" content="1371" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Structured data -->
  <script type="application/ld+json">
  { "@context": "https://schema.org", "@type": "CafeOrCoffeeShop", "name": "La Cafeleta",
    "servesCuisine": ["Café", "Bebidas"], "priceRange": "$" }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500;1,600&family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="menu-page">

  <main class="shell">

    <!-- HERO -->
    <header class="cafe-hero">
      <div class="cafe-hero-inner">
        <div class="mono" data-monogram>LC</div>
        <h1 class="cafe-title" data-brand-name>LA CAFELETA</h1>
        <p class="cafe-tagline" data-tagline>Café Colombiano Premium</p>
        <div class="ornament">
          <span class="line"></span><span class="diamond"></span><span class="line"></span>
        </div>
      </div>
    </header>

    <!-- FOTO DEL CARRITO (banner, se muestra si brand.heroImg existe) -->
    <div class="hero-photo" data-hero-photo hidden></div>

    <!-- MENÚ (secciones inyectadas desde restaurant.js) -->
    <div class="menu" data-menu></div>

    <!-- FOOTER -->
    <footer class="cafe-footer">
      <div class="ornament">
        <span class="line"></span><span class="diamond"></span><span class="line"></span>
      </div>
      <p class="thanks" data-thanks>Gracias por tu visita</p>
      <p class="footnote" data-footnote>© 2026 LA CAFELETA · TRADICIÓN COLOMBIANA</p>
    </footer>

  </main>

  <script src="data/restaurant.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
