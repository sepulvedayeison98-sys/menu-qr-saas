<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Cafeleta — Carta para imprimir</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500;1,600&family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #B8902E;
      --ink: #171310;
      --muted: #6b6459;
      --line: rgba(23, 19, 16, 0.16);
      --serif: "Playfair Display", Georgia, "Times New Roman", serif;
      --serif-it: "Cormorant Garamond", Georgia, serif;
      --label: "Montserrat", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #d9d6d0; }
    body { font-family: var(--serif-it); color: var(--ink); -webkit-font-smoothing: antialiased; }

    .toolbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px; background: #171310;
    }
    .toolbar button, .toolbar a {
      font-family: var(--label); font-weight: 600; font-size: 13px; letter-spacing: 0.5px;
      padding: 10px 20px; border-radius: 999px; border: 1px solid transparent;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center;
    }
    .toolbar .primary { background: var(--gold); color: #171310; }
    .toolbar .ghost { background: transparent; color: #EDE7DC; border-color: rgba(255,255,255,0.3); }

    /* La "hoja": A4 exacto en pantalla, con el padding = margen real de impresion */
    .sheet {
      width: 210mm; min-height: 297mm;
      margin: 24px auto; background: #fdfcfa;
      padding: 14mm 13mm; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .p-header { text-align: center; margin-bottom: 10mm; }
    .p-mono {
      display: inline-flex; align-items: center; justify-content: center;
      width: 19mm; height: 19mm; border: 1px solid var(--gold); border-radius: 50%;
      font-family: var(--serif); font-weight: 600; font-size: 18px; color: var(--gold);
      margin-bottom: 3mm;
    }
    .p-title { font-family: var(--serif); font-weight: 700; font-size: 34px; letter-spacing: 1.5px; text-transform: uppercase; }
    .p-tagline { font-family: var(--serif-it); font-style: italic; font-size: 16px; color: var(--gold); margin-top: 1.5mm; }
    .p-ornament { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 4mm; }
    .p-ornament .l { height: 1px; width: 40px; background: var(--gold); }
    .p-ornament .d { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    .p-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14mm; }
    .p-col { min-width: 0; }

    .p-cat { margin-bottom: 5mm; }
    .p-cat + .p-cat { margin-top: 9mm; }
    .p-cat-label {
      font-family: var(--label); font-weight: 700; font-size: 14px; letter-spacing: 4px;
      color: var(--gold); text-align: center;
    }
    .p-cat-line { display: flex; justify-content: center; margin: 2.5mm 0 5mm; }
    .p-cat-line span { height: 1px; width: 26px; background: var(--gold); }

    .p-item { padding: 3mm 0; border-bottom: 1px dotted var(--line); }
    .p-item:last-child { border-bottom: none; }
    .p-row { display: flex; align-items: baseline; gap: 6px; }
    .p-name { font-family: var(--label); font-weight: 600; font-size: 14.5px; color: var(--ink); white-space: nowrap; flex: none; }
    .p-star { color: var(--gold); font-weight: 700; margin-left: 2px; }
    .p-leader { flex: 1; border-bottom: 1px dotted var(--line); margin-bottom: 3px; min-width: 6px; }
    .p-price { font-family: var(--label); font-weight: 700; font-size: 14.5px; color: var(--ink); white-space: nowrap; }
    .p-price.multi { display: flex; gap: 8px; white-space: nowrap; }
    .p-price.multi .tam { font-family: var(--serif-it); font-style: italic; font-weight: 400; font-size: 12px; color: var(--muted); margin-right: 2px; }
    .p-desc { font-family: var(--serif-it); font-style: italic; font-size: 13.5px; line-height: 1.3; color: var(--muted); margin-top: 0.8mm; }

    .p-footer { margin-top: 10mm; padding-top: 6mm; border-top: 1px solid var(--line); text-align: center; }
    .p-note { font-family: var(--serif-it); font-style: italic; font-size: 13px; color: var(--muted); line-height: 1.4; }
    .p-note b { color: var(--gold); font-style: normal; }
    .p-url { font-family: var(--label); font-size: 10.5px; letter-spacing: 1.5px; color: var(--muted); margin-top: 3mm; }

    @media print {
      @page { size: A4; margin: 0; }
      html, body { background: #fff; }
      .toolbar { display: none; }
      .sheet { box-shadow: none; margin: 0; width: auto; min-height: 0; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <a class="ghost" href="admin.html">← Volver</a>
    <button class="primary" id="btnImprimir">Imprimir / Guardar PDF</button>
  </div>

  <main class="sheet">
    <header class="p-header">
      <div class="p-mono" data-monogram>LC</div>
      <h1 class="p-title" data-brand-name>La Cafeleta</h1>
      <p class="p-tagline" data-tagline>Café Colombiano Premium</p>
      <div class="p-ornament"><span class="l"></span><span class="d"></span><span class="l"></span></div>
    </header>

    <div class="p-columns" data-columns>
      <div class="p-col" data-col-left></div>
      <div class="p-col" data-col-right></div>
    </div>

    <footer class="p-footer">
      <p class="p-note" data-aperitivo-note hidden></p>
      <p class="p-url" data-menu-url></p>
    </footer>
  </main>

  <script src="data/restaurant.js"></script>
  <script>
    (function () {
      var R = window.RESTAURANT;
      if (!R) return console.error("Falta restaurant.js");
      var b = R.brand || {};
      var esc = function (s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); };
      var cop = function (v) { return typeof v === "number" ? "$" + v.toLocaleString("es-CO") : esc(v); };

      document.title = (b.nombre || "Menú") + " — Carta para imprimir";
      document.querySelectorAll("[data-brand-name]").forEach(function (n) { n.textContent = b.nombre || ""; });
      document.querySelectorAll("[data-monogram]").forEach(function (n) { n.textContent = b.monogram || ""; });
      var tag = document.querySelector("[data-tagline]"); if (tag && b.tagline) tag.textContent = b.tagline;
      var urlEl = document.querySelector("[data-menu-url]"); if (urlEl) urlEl.textContent = b.menuUrl || "";

      function priceCell(d) {
        if (Array.isArray(d.precios) && d.precios.length) {
          return '<span class="p-price multi">' +
            d.precios.map(function (p) { return '<span class="tam">' + esc(p.tam) + '</span>' + cop(p.precio); }).join('<span style="width:4px;display:inline-block"></span>') +
            '</span>';
        }
        return '<span class="p-price">' + cop(d.precio) + '</span>';
      }

      function renderCategory(cat) {
        var html = '<div class="p-cat"><p class="p-cat-label">' + esc((cat.nombre || "").toUpperCase()) + '</p>' +
          '<div class="p-cat-line"><span></span></div>';
        (cat.items || []).forEach(function (d) {
          var star = d.aperitivo ? '<span class="p-star">*</span>' : "";
          var desc = d.desc ? '<p class="p-desc">' + esc(d.desc) + '</p>' : "";
          html += '<div class="p-item"><div class="p-row">' +
            '<span class="p-name">' + esc(d.nombre || "") + star + '</span>' +
            '<span class="p-leader"></span>' + priceCell(d) +
            '</div>' + desc + '</div>';
        });
        html += '</div>';
        return html;
      }

      // Reparte categorías completas entre las 2 columnas balanceando por
      // cantidad de items, preservando el orden de lectura dentro de cada una.
      var cats = R.categorias || [];
      var colTotals = [0, 0];
      var colEls = [document.querySelector("[data-col-left]"), document.querySelector("[data-col-right]")];
      cats.forEach(function (cat) {
        var idx = colTotals[0] <= colTotals[1] ? 0 : 1;
        colEls[idx].insertAdjacentHTML("beforeend", renderCategory(cat));
        colTotals[idx] += (cat.items || []).length;
      });

      // Nota de aperitivo (una sola vez al pie, si algún item la usa)
      var apNote = document.querySelector("[data-aperitivo-note]");
      var tieneAperitivo = cats.some(function (cat) { return (cat.items || []).some(function (d) { return d.aperitivo; }); });
      if (apNote && R.aperitivo && tieneAperitivo) {
        apNote.innerHTML = '<b>*</b> Aperitivo opcional: ' + esc(R.aperitivo) + '.';
        apNote.hidden = false;
      }

      document.getElementById("btnImprimir").onclick = function () { window.print(); };
    })();
  </script>
</body>
</html>
